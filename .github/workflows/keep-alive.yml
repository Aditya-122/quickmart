name: Keep Render instance alive

on:
  schedule:
    # Runs every 14 minutes — Render free tier sleeps after 15 min of inactivity.
    - cron: '*/14 * * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping search endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://quickmart-ap0y.onrender.com/search?q=milk&page_size=1")
          echo "Response status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 500 ]; then
            echo "Unexpected status $STATUS" && exit 1
          fi
